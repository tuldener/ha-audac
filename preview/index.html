<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Audac MTX Card – Preview</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px;
      transition: background 0.3s ease;
    }

    body.dark {
      background: #111318;
      color: #e4e6eb;
    }

    body.light {
      background: #f0f2f5;
      color: #1a1c20;
    }

    .preview-header {
      text-align: center;
      margin-bottom: 32px;
      max-width: 500px;
    }

    .preview-header h1 {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }

    .preview-header p {
      font-size: 14px;
      opacity: 0.6;
      line-height: 1.5;
    }

    .theme-toggle {
      position: fixed;
      top: 16px;
      right: 16px;
      width: 44px;
      height: 44px;
      border-radius: 14px;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      z-index: 100;
      transition: all 0.3s ease;
    }

    body.dark .theme-toggle {
      background: rgba(255,255,255,0.08);
      color: #e4e6eb;
    }

    body.light .theme-toggle {
      background: rgba(0,0,0,0.06);
      color: #1a1c20;
    }

    .card-container {
      width: 100%;
      max-width: 480px;
    }

    .badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 8px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 16px;
    }

    body.dark .badge {
      background: rgba(124, 107, 240, 0.15);
      color: #7c6bf0;
    }

    body.light .badge {
      background: rgba(124, 107, 240, 0.1);
      color: #7c6bf0;
    }
  </style>
</head>
<body class="dark">
  <button class="theme-toggle" onclick="toggleTheme()" title="Toggle Theme">🌙</button>

  <div class="preview-header">
    <span class="badge">HACS Dashboard Card</span>
    <h1>Audac MTX Card</h1>
    <p>Custom Lovelace Card für Home Assistant zur Steuerung von Audac MTX Audio-Matrizen. Arbeitet mit der ha-audac Integration.</p>
  </div>

  <div class="card-container">
    <audac-mtx-card id="preview-card"></audac-mtx-card>
  </div>

  <script src="/audac-mtx-card.js"></script>
  <script>
    const sourceOptions = ["None", "Mic 1", "Mic 2", "Line 3", "Line 4", "Line 5", "Line 6", "WLI/MWX65", "WMI"];

    const mockHass = {
      states: {
        "number.audac_zone_1_volume": {
          state: "45",
          entity_id: "number.audac_zone_1_volume",
          attributes: {
            friendly_name: "Empfangsbereich Volume",
            min: 0,
            max: 70,
            step: 1,
            unit_of_measurement: "dB",
          },
        },
        "select.audac_zone_1_source": {
          state: "Line 3",
          entity_id: "select.audac_zone_1_source",
          attributes: {
            friendly_name: "Empfangsbereich Source",
            options: sourceOptions,
          },
        },
        "switch.audac_zone_1_mute": {
          state: "off",
          entity_id: "switch.audac_zone_1_mute",
          attributes: { friendly_name: "Empfangsbereich Mute" },
        },

        "number.audac_zone_2_volume": {
          state: "30",
          entity_id: "number.audac_zone_2_volume",
          attributes: {
            friendly_name: "Konferenzraum Volume",
            min: 0, max: 70, step: 1, unit_of_measurement: "dB",
          },
        },
        "select.audac_zone_2_source": {
          state: "Mic 1",
          entity_id: "select.audac_zone_2_source",
          attributes: { friendly_name: "Konferenzraum Source", options: sourceOptions },
        },
        "switch.audac_zone_2_mute": {
          state: "off",
          entity_id: "switch.audac_zone_2_mute",
          attributes: { friendly_name: "Konferenzraum Mute" },
        },

        "number.audac_zone_3_volume": {
          state: "20",
          entity_id: "number.audac_zone_3_volume",
          attributes: {
            friendly_name: "Restaurant Volume",
            min: 0, max: 70, step: 1, unit_of_measurement: "dB",
          },
        },
        "select.audac_zone_3_source": {
          state: "Line 5",
          entity_id: "select.audac_zone_3_source",
          attributes: { friendly_name: "Restaurant Source", options: sourceOptions },
        },
        "switch.audac_zone_3_mute": {
          state: "on",
          entity_id: "switch.audac_zone_3_mute",
          attributes: { friendly_name: "Restaurant Mute" },
        },

        "number.audac_zone_4_volume": {
          state: "55",
          entity_id: "number.audac_zone_4_volume",
          attributes: {
            friendly_name: "Terrasse Volume",
            min: 0, max: 70, step: 1, unit_of_measurement: "dB",
          },
        },
        "select.audac_zone_4_source": {
          state: "Line 4",
          entity_id: "select.audac_zone_4_source",
          attributes: { friendly_name: "Terrasse Source", options: sourceOptions },
        },
        "switch.audac_zone_4_mute": {
          state: "off",
          entity_id: "switch.audac_zone_4_mute",
          attributes: { friendly_name: "Terrasse Mute" },
        },

        "number.audac_zone_5_volume": {
          state: "0",
          entity_id: "number.audac_zone_5_volume",
          attributes: {
            friendly_name: "Lager Volume",
            min: 0, max: 70, step: 1, unit_of_measurement: "dB",
          },
        },
        "select.audac_zone_5_source": {
          state: "None",
          entity_id: "select.audac_zone_5_source",
          attributes: { friendly_name: "Lager Source", options: sourceOptions },
        },
        "switch.audac_zone_5_mute": {
          state: "off",
          entity_id: "switch.audac_zone_5_mute",
          attributes: { friendly_name: "Lager Mute" },
        },
      },
      callService: async (domain, service, data) => {
        console.log(`[Mock] ${domain}.${service}`, data);
        const entityId = data.entity_id;
        const entity = mockHass.states[entityId];
        if (!entity) return;

        if (domain === "number" && service === "set_value") {
          entity.state = String(data.value);
        } else if (domain === "switch" && service === "turn_on") {
          entity.state = "on";
        } else if (domain === "switch" && service === "turn_off") {
          entity.state = "off";
        } else if (domain === "select" && service === "select_option") {
          entity.state = data.option;
        }

        card.hass = mockHass;
      },
    };

    const card = document.getElementById("preview-card");

    card.setConfig({
      title: "Audac MTX",
      zones: [
        {
          name: "Empfangsbereich",
          volume: "number.audac_zone_1_volume",
          source: "select.audac_zone_1_source",
          mute: "switch.audac_zone_1_mute",
        },
        {
          name: "Konferenzraum",
          volume: "number.audac_zone_2_volume",
          source: "select.audac_zone_2_source",
          mute: "switch.audac_zone_2_mute",
        },
        {
          name: "Restaurant",
          volume: "number.audac_zone_3_volume",
          source: "select.audac_zone_3_source",
          mute: "switch.audac_zone_3_mute",
        },
        {
          name: "Terrasse",
          volume: "number.audac_zone_4_volume",
          source: "select.audac_zone_4_source",
          mute: "switch.audac_zone_4_mute",
        },
        {
          name: "Lager",
          volume: "number.audac_zone_5_volume",
          source: "select.audac_zone_5_source",
          mute: "switch.audac_zone_5_mute",
        },
      ],
      show_bass_treble: true,
      show_source: true,
      theme: "dark",
    });

    card.hass = mockHass;

    function toggleTheme() {
      const body = document.body;
      const btn = document.querySelector(".theme-toggle");

      if (body.classList.contains("dark")) {
        body.classList.replace("dark", "light");
        btn.textContent = "☀️";
        card.setConfig({ ...card._config, theme: "light" });
      } else {
        body.classList.replace("light", "dark");
        btn.textContent = "🌙";
        card.setConfig({ ...card._config, theme: "dark" });
      }
      card.hass = mockHass;
    }
  </script>
</body>
</html>
